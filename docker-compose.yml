services:

  postgres:
    image: postgres:16
    container_name: rapido-postgres
    environment:
      POSTGRES_DB: rapido_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Nagesh2425
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rapido_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - rapido-network

  redis:
    image: redis:7
    container_name: rapido-redis
    ports:
      - "6379:6379"
    networks:
      - rapido-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: rapido-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - rapido-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: rapido-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: rapido-zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://rapido-kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
    networks:
      - rapido-network

  rabbitmq:
    image: rabbitmq:management
    container_name: rapido-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - rapido-network

  zipkin:
    image: openzipkin/zipkin
    container_name: rapido-zipkin
    ports:
      - "9411:9411"
    networks:
      - rapido-network

  eureka-server:
    build: ./eureka-server
    container_name: eureka-server
    ports:
      - "8761:8761"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - rapido-network

  auth-service:
    build: ./auth-service
    container_name: auth-service
    ports:
      - "8081:8081"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: rapido_db
      DB_USERNAME: postgres
      DB_PASSWORD: Nagesh2425
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      eureka-server:
        condition: service_started
      zipkin:
        condition: service_started
    networks:
      - rapido-network

  user-service:
    build: ./user-service
    container_name: user-service
    ports:
      - "8082:8082"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: rapido_db
      DB_USERNAME: postgres
      DB_PASSWORD: Nagesh2425
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      eureka-server:
        condition: service_started
      zipkin:
        condition: service_started
    networks:
      - rapido-network

  driver-service:
    build: ./driver-service
    container_name: driver-service
    ports:
      - "8083:8083"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: rapido_db
      DB_USERNAME: postgres
      DB_PASSWORD: Nagesh2425
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      eureka-server:
        condition: service_started
      zipkin:
        condition: service_started
    networks:
      - rapido-network

  ride-service:
    build: ./ride-service
    container_name: ride-service
    ports:
      - "8084:8084"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: rapido_db
      DB_USERNAME: postgres
      DB_PASSWORD: Nagesh2425
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      eureka-server:
        condition: service_started
      zipkin:
        condition: service_started
    networks:
      - rapido-network

  payment-service:
    build: ./payment-service
    container_name: payment-service
    ports:
      - "8085:8085"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: rapido_db
      DB_USERNAME: postgres
      DB_PASSWORD: Nagesh2425
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      rabbitmq:
        condition: service_started
      eureka-server:
        condition: service_started
      zipkin:
        condition: service_started
    networks:
      - rapido-network

  notification-service:
    build: ./notification-service
    container_name: notification-service
    ports:
      - "8086:8086"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: rapido_db
      DB_USERNAME: postgres
      DB_PASSWORD: Nagesh2425
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_started
      kafka:
        condition: service_started
      eureka-server:
        condition: service_started
      zipkin:
        condition: service_started
    networks:
      - rapido-network

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    depends_on:
      auth-service:
        condition: service_started
      user-service:
        condition: service_started
      ride-service:
        condition: service_started
      payment-service:
        condition: service_started
      notification-service:
        condition: service_started
      redis:
        condition: service_started
      eureka-server:
        condition: service_started
    networks:
      - rapido-network

networks:
  rapido-network:
    driver: bridge