services:

  postgres:
    image: postgres:16
    container_name: rapido-postgres
    environment:
      POSTGRES_DB: rapido_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Nagesh2425
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rapido_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - rapido-network

  redis:
    image: redis:7
    container_name: rapido-redis
    ports:
      - "6379:6379"
    networks:
      - rapido-network

  eureka-server:
    build: ./eureka-server
    container_name: eureka-server
    ports:
      - "8761:8761"
    networks:
      - rapido-network

  zipkin:
    image: openzipkin/zipkin
    container_name: rapido-zipkin
    ports:
      - "9411:9411"
    networks:
      - rapido-network

  auth-service:
    build: ./auth-service
    container_name: auth-service
    ports:
      - "8081:8081"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: rapido_db
      DB_USERNAME: postgres
      DB_PASSWORD: Nagesh2425
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_started
      zipkin:
        condition: service_started
    networks:
      - rapido-network

  user-service:
    build: ./user-service
    container_name: user-service
    ports:
      - "8082:8082"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: rapido_db
      DB_USERNAME: postgres
      DB_PASSWORD: Nagesh2425
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_started
      zipkin:
        condition: service_started
    networks:
      - rapido-network

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    depends_on:
      auth-service:
        condition: service_started
      user-service:
        condition: service_started
      eureka-server:
        condition: service_started
      zipkin:
        condition: service_started
      redis:
        condition: service_started
    networks:
      - rapido-network

  driver-service:
    build: ./driver-service
    container_name: driver-service
    ports:
      - "8083:8083"
    networks:
      - rapido-network

  ride-service:
    build: ./ride-service
    container_name: ride-service
    ports:
      - "8084:8084"
    networks:
      - rapido-network

  communication-service:
    build: ./communication-service
    container_name: communication-service
    ports:
      - "8087:8087"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/rapido_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: Nagesh2425

      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      eureka-server:
        condition: service_started
      zipkin:
        condition: service_started
    networks:
      - rapido-network

networks:
  rapido-network:
    driver: bridge