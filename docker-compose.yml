services:

  postgres:
    image: postgres:16
    container_name: rapido-postgres
    environment:
      POSTGRES_DB: rapido_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Nagesh2425
    ports:
      - "5432:5432"
    networks:
      - rapido-network

  redis:
    image: redis:7
    container_name: rapido-redis
    ports:
      - "6379:6379"
    networks:
      - rapido-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: rapido-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"
    networks:
      - rapido-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: rapido-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: rapido-zookeeper:2181

      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://rapido-kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - rapido-network

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: rapido-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
      - "9300:9300"
    networks:
      - rapido-network

  eureka-server:
    build: ./eureka-server
    container_name: eureka-server
    ports:
      - "8761:8761"
    networks:
      - rapido-network

  driver-service:
    build: ./driver-service
    container_name: driver-service
    ports:
      - "8083:8083"
    environment:
      SPRING_APPLICATION_NAME: driver-service
      SPRING_DATASOURCE_URL: jdbc:postgresql://rapido-postgres:5432/rapido_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: Nagesh2425
      SPRING_KAFKA_BOOTSTRAP_SERVERS: rapido-kafka:9092
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka
    depends_on:
      - postgres
      - kafka
      - eureka-server
    networks:
      - rapido-network

  ride-service:
    build: ./ride-service
    container_name: ride-service
    ports:
      - "8084:8084"
    environment:
      SPRING_APPLICATION_NAME: ride-service
      SPRING_KAFKA_BOOTSTRAP_SERVERS: rapido-kafka:9092
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka
    depends_on:
      - kafka
      - eureka-server
    networks:
      - rapido-network

  search-service:
    build: ./search-service
    container_name: search-service
    ports:
      - "8087:8088"
    environment:
      SPRING_APPLICATION_NAME: search-service
      SPRING_DATASOURCE_URL: jdbc:postgresql://rapido-postgres:5432/rapido_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: Nagesh2425
      SPRING_KAFKA_BOOTSTRAP_SERVERS: rapido-kafka:9092
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka
      SPRING_ELASTICSEARCH_URIS: http://rapido-elasticsearch:9200
    depends_on:
      - postgres
      - kafka
      - eureka-server
      - elasticsearch
    networks:
      - rapido-network

  auth-service:
    build: ./auth-service
    container_name: auth-service
    ports:
      - "8081:8081"
    depends_on:
      - postgres
    networks:
      - rapido-network

  user-service:
    build: ./user-service
    container_name: user-service
    ports:
      - "8082:8082"
    depends_on:
      - postgres
    networks:
      - rapido-network

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    depends_on:
      - eureka-server
      - auth-service
      - user-service
    networks:
      - rapido-network

networks:
  rapido-network:
    driver: bridge