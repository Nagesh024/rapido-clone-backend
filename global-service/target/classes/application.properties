spring.application.name=global-service

spring.datasource.url=jdbc:postgresql://localhost:5432/rapido_db
spring.datasource.username=postgres
spring.datasource.password=Nagesh2425
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

server.port=8080

logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

spring.messages.basename=i18n/messages
spring.messages.encoding=UTF-8

spring.kafka.bootstrap-servers=localhost:9092

spring.kafka.consumer.group-id=global-service

spring.kafka.consumer.auto-offset-reset=earliest

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer

spring.kafka.consumer.properties.spring.json.trusted.packages=com.rapido.globalservice.kafka

platform.routing.primary-region=region-a
platform.routing.secondary-region=region-b

management.endpoints.web.exposure.include=health,prometheus,metrics
management.endpoint.health.show-details=always

spring.cloud.gateway.routes[0].id=region-a-route
spring.cloud.gateway.routes[0].uri=http://ride-service.rapido-region-a.svc.cluster.local:8080
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/**

spring.cloud.gateway.routes[1].id=region-b-route
spring.cloud.gateway.routes[1].uri=http://ride-service.rapido-region-b.svc.cluster.local:8080
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/**