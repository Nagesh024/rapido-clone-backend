spring:
  application:
    name: auth-service

  datasource:
    url: jdbc:postgresql://localhost:5432/rapido_db
    username: postgres
    password: Nagesh2425
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8081

eureka:
  client:
    enabled: false

management:
  endpoint:
    health:
      show-details: always

  endpoints:
    web:
      exposure:
        include:
          - health
          - info
          - metrics
          - prometheus