version: '3.8'

services:

  postgres:
    image: postgres:16
    container_name: rapido-postgres
    environment:
      POSTGRES_DB: rapido_db
      POSTGRES_USER: rapido_user
      POSTGRES_PASSWORD: rapido_pass
    ports:
      - "5432:5432"

  auth-service:
    build: ./auth-service
    container_name: auth-service
    ports:
      - "8081:8081"
    environment:
      DB_HOST: rapido-postgres
      DB_PORT: 5432
      DB_NAME: rapido_db
      DB_USERNAME: rapido_user
      DB_PASSWORD: rapido_pass
    depends_on:
      - postgres

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"

  user-service:
    build: ./user-service
    container_name: user-service
    ports:
      - "8082:8082"
    environment:
      DB_HOST: rapido-postgres
      DB_PORT: 5432
      DB_NAME: rapido_db
      DB_USERNAME: rapido_user
      DB_PASSWORD: rapido_pass
    depends_on:
      - postgres

  driver-service:
    build: ./driver-service
    container_name: driver-service
    ports:
      - "8083:8083"
    environment:
      DB_HOST: rapido-postgres
      DB_PORT: 5432
      DB_NAME: rapido_db
      DB_USERNAME: rapido_user
      DB_PASSWORD: rapido_pass
    depends_on:
      - postgres

  ride-service:
    build: ./ride-service
    container_name: ride-service
    ports:
      - "8084:8084"
    environment:
      DB_HOST: rapido-postgres
      DB_PORT: 5432
      DB_NAME: rapido_db
      DB_USERNAME: rapido_user
      DB_PASSWORD: rapido_pass
    depends_on:
      - postgres