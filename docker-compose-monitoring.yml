version: '3.8'

services:
  prometheus:
    image: prom/prometheus
    container_name: rapido-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    restart: unless-stopped

  grafana:
    image: grafana/grafana
    container_name: rapido-grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    restart: unless-stopped