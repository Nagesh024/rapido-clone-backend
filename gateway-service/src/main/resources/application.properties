server.port=8080
spring.application.name=gateway-service

# Gateway routes
spring.cloud.gateway.routes[0].id=ride-service
spring.cloud.gateway.routes[0].uri=http://localhost:8084
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/rides/**

# JWT validation
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost