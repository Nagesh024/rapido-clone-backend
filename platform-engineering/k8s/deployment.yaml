apiVersion: apps/v1
kind: Deployment

metadata:
  name: platform-engineering

spec:
  replicas: 2

  selector:
    matchLabels:
      app: platform-engineering

  template:
    metadata:
      labels:
        app: platform-engineering

    spec:
      containers:
        - name: platform-engineering

          image: platform-engineering:1.0.0

          ports:
            - containerPort: 8088