apiVersion: apps/v1
kind: Deployment
metadata:
  name: ride-service
  namespace: dev

spec:
  replicas: 2

  selector:
    matchLabels:
      app: ride-service

  template:
    metadata:
      labels:
        app: ride-service

    spec:
      containers:

        - name: ride-service

          image: company/ride-service:1.0.0

          ports:
            - containerPort: 8080

          env:
            - name: SPRING_PROFILES_ACTIVE
              value: dev