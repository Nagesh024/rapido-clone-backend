apiVersion: autoscaling/v2

kind: HorizontalPodAutoscaler

metadata:
  name: ride-service-hpa

spec:

  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ride-service

  minReplicas: 2
  maxReplicas: 10

  metrics:

    - type: Resource

      resource:
        name: cpu

        target:
          type: Utilization
          averageUtilization: 70