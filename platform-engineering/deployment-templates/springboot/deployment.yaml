apiVersion: apps/v1
kind: Deployment

metadata:
  name: ride-service

spec:
  replicas: 2

  selector:
    matchLabels:
      app: ride-service

  template:
    metadata:
      labels:
        app: ride-service

    spec:
      containers:

        - name: ride-service

          image: ride-service:latest

          ports:
            - containerPort: 8080

          envFrom:
            - configMapRef:
                name: ride-service-config

          resources:

            requests:
              cpu: "250m"
              memory: "512Mi"

            limits:
              cpu: "500m"
              memory: "1Gi"