spring.application.name=ride-service

# ================= SERVER =================
server.port=8084

# ================= DATABASE =================
spring.datasource.url=jdbc:postgresql://localhost:5432/rapido_db
spring.datasource.username=postgres
spring.datasource.password=Nagesh2425
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ================= KAFKA (IMPORTANT ADDITION) =================
spring.kafka.bootstrap-servers=localhost:9092

# Producer serialization
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# Consumer deserialization
spring.kafka.consumer.group-id=ride-service-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*

# ================= REDIS =================
spring.data.redis.host=localhost
spring.data.redis.port=6379

# ================= SECURITY =================
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8090
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8090/oauth2/jwks

# ================= ACTUATOR =================
management.endpoints.web.exposure.include=health,info,metrics,prometheus

# ================= IMPORTANT FIX (VERY IMPORTANT FOR YOUR ERROR) =================
spring.main.web-application-type=servlet