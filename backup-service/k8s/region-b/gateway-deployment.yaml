apiVersion: apps/v1
kind: Deployment

metadata:
  name: api-gateway
  namespace: rapido-region-b

spec:
  replicas: 2

  selector:
    matchLabels:
      app: api-gateway

  template:
    metadata:
      labels:
        app: api-gateway

    spec:
      containers:
      - name: api-gateway

        image: rapido/api-gateway:latest

        ports:
        - containerPort: 8080

        envFrom:
        - configMapRef:
            name: rapido-config

        - secretRef:
            name: rapido-secret
---
apiVersion: v1
kind: Service

metadata:
  name: api-gateway
  namespace: rapido-region-b

spec:
  selector:
    app: api-gateway

  ports:
  - port: 8080
    targetPort: 8080