apiVersion: apps/v1
kind: Deployment

metadata:
  name: payment-service
  namespace: rapido-region-a

spec:
  replicas: 2

  selector:
    matchLabels:
      app: payment-service

  template:
    metadata:
      labels:
        app: payment-service

    spec:
      containers:
      - name: payment-service

        image: rapido/payment-service:latest

        ports:
        - containerPort: 8083

        envFrom:
        - configMapRef:
            name: rapido-config

        - secretRef:
            name: rapido-secret