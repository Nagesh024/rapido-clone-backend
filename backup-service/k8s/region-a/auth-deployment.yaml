apiVersion: apps/v1
kind: Deployment

metadata:
  name: auth-service
  namespace: rapido-region-a

spec:
  replicas: 2

  selector:
    matchLabels:
      app: auth-service

  template:
    metadata:
      labels:
        app: auth-service

    spec:
      containers:
      - name: auth-service

        image: rapido/auth-service:latest

        ports:
        - containerPort: 8081

        envFrom:
        - configMapRef:
            name: rapido-config

        - secretRef:
            name: rapido-secret