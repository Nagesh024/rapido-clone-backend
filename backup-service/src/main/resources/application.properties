spring.application.name=backup-service

server.port=8080

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

region.primary=region-a
region.secondary=region-b

spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration


spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.url=jdbc:postgresql://localhost:5432,localhost:5433/rapidodb?targetServerType=primary


spring.datasource.username=postgres

spring.datasource.password=postgres

backup.full.cron=0 0 0 * * *

backup.incremental.cron=0 0 * * * *

aws.region=ap-south-1

aws.s3.bucket=rapido-dr-backups

aws.access-key=test-access-key

aws.secret-key=test-secret-key

spring.kafka.bootstrap-servers=localhost:9092

kafka.region.a=localhost:9092

kafka.region.b=localhost:9093

postgres.data.path=C:/postgres/data

postgres.backup.path=C:/backup/postgres/base

postgres.recovery.target.time=2026-06-14 23:00:00

spring.datasource.hikari.maximum-pool-size=20

spring.datasource.hikari.minimum-idle=5

spring.datasource.hikari.connection-timeout=30000

spring.datasource.hikari.validation-timeout=5000


elasticsearch.primary.url=http://localhost:9200

elasticsearch.secondary.url=http://localhost:9201

elasticsearch.snapshot.repository=rapido-backups


spring.data.redis.host=localhost
spring.data.redis.port=6379

redis.master=mymaster

redis.sentinel.nodes=localhost:26379

route53.hosted-zone-id=Z123456789

route53.record-name=api.rapido.com

db.primary.url=jdbc:postgresql://localhost:5432/rapido_primary

db.secondary.url=jdbc:postgresql://localhost:5433/rapido_secondary

db.username=postgres

db.password=postgres