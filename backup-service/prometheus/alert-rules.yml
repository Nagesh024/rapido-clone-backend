groups:

- name: rapido-disaster-recovery

  rules:

  - alert: RegionDown
    expr: up == 0
    for: 1m

  - alert: ReplicationLag
    expr: replication_lag_seconds > 60
    for: 2m

  - alert: BackupFailure
    expr: backup_success == 0
    for: 1m

  - alert: HighErrorRate
    expr: http_server_requests_seconds_count > 1000
    for: 1m

  - alert: RecoveryFailure
    expr: recovery_status == 0
    for: 1m