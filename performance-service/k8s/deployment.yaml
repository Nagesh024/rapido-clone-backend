apiVersion: apps/v1
kind: Deployment

metadata:
  name: performance-service
  namespace: rapido-performance

spec:
  replicas: 3

  selector:
    matchLabels:
      app: performance-service

  template:
    metadata:
      labels:
        app: performance-service

    spec:
      containers:
        - name: performance-service
          image: performance-service:latest
          imagePullPolicy: Never

          ports:
            - containerPort: 8080

          resources:
