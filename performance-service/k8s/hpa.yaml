apiVersion: autoscaling/v2

kind: HorizontalPodAutoscaler

metadata:
  name: performance-service-hpa
  namespace: rapido-performance

spec:

  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: performance-service

  minReplicas: 3
  maxReplicas: 20

  metrics:

  - type: Resource

    resource:
      name: cpu

      target:
        type: Utilization
        averageUtilization: 70